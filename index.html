<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레트로 사진 보정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        /* iframe 호환성을 위해 body와 html을 고정하고, 내부 컨테이너를 absolute로 채움 */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            overflow: hidden;
        }

        .canvas-container {
            background-image: 
                linear-gradient(45deg, #1f1f1f 25%, transparent 25%), 
                linear-gradient(-45deg, #1f1f1f 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1f1f1f 75%), 
                linear-gradient(-45deg, transparent 75%, #1f1f1f 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #a855f7;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #374151;
            border-radius: 2px;
        }

        input[type=range]:focus {
            outline: none;
        }

        .spin-hidden::-webkit-outer-spin-button,
        .spin-hidden::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .spin-hidden {
            -moz-appearance: textfield;
        }
        
        .loader {
            border: 3px solid #374151;
            border-bottom-color: #a855f7;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2); 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.4); 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.6); 
        }

        #global-tooltip {
            position: fixed;
            background-color: #1f2937;
            color: #e5e7eb;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 1px solid #374151;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.2s, visibility 0.2s;
            z-index: 9999;
            max-width: 220px;
            word-break: keep-all;
            line-height: 1.5;
            font-weight: 400;
        }

        #brush-cursor {
            position: fixed;
            border-radius: 50%;
            border: 1.5px solid white;
            box-shadow: 0 0 3px rgba(0,0,0,0.8), inset 0 0 3px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 50;
            display: none;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
<!-- iframe 오류 방지: absolute inset-0 으로 꽉 채우는 래퍼 -->
<div class="fixed inset-0 w-full h-full flex flex-col p-0 sm:p-4 box-border bg-[#121212] m-0 overflow-hidden">
    <div id="brush-cursor"></div>
    <div id="global-tooltip"></div>

    <div class="w-full h-full max-w-[1600px] mx-auto bg-gray-900 sm:rounded-2xl shadow-2xl overflow-hidden sm:border border-gray-800 flex flex-col md:flex-row flex-1 min-h-0">
        
        <!-- 좌측/상단: 이미지 프리뷰 영역 -->
        <div class="flex-1 p-4 sm:p-6 flex flex-col min-h-0">
            <h1 class="text-2xl font-bold mb-3 sm:mb-4 text-white flex items-center gap-2 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-500"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                레트로 픽
            </h1>
            
            <div id="dropzone" class="canvas-container relative flex-1 rounded-xl border-2 border-dashed border-gray-700 flex items-center justify-center overflow-hidden group hover:border-purple-500 transition-colors cursor-pointer">
                
                <div id="upload-placeholder" class="text-center p-6 pointer-events-none">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-3 text-gray-500 group-hover:text-purple-400 transition-colors"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <p class="text-gray-400 font-medium">클릭하거나 이미지를 드래그하세요</p>
                    <p class="text-gray-600 text-sm mt-1">PNG, JPG 지원</p>
                </div>

                <canvas id="canvas" class="hidden max-w-full max-h-full object-contain absolute inset-0 m-auto touch-none"></canvas>
                
                <div id="loading" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center backdrop-blur-sm z-10 pointer-events-none">
                    <div class="flex flex-col items-center gap-3">
                        <span class="loader w-10 h-10"></span>
                        <span class="text-sm font-medium text-purple-400 text-center">필터 적용 중...</span>
                    </div>
                </div>

                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>
        </div>

        <!-- 우측/하단: 컨트롤 패널 영역 -->
        <div class="w-full md:w-[360px] lg:w-[420px] bg-gray-950 p-4 sm:p-6 border-t md:border-t-0 md:border-l border-gray-800 flex flex-col gap-4 h-[45vh] md:h-full shrink-0">
            
            <div class="space-y-4 flex-1 overflow-y-auto pr-2 custom-scrollbar">
                <h2 class="text-lg font-semibold text-gray-300 border-b border-gray-800 pb-2 sticky top-0 bg-gray-950 z-10 pt-1">필터 설정</h2>

                <!-- 0. 캔버스 배경 설정 (효과 분리용) -->
                <div class="space-y-1 pb-3 border-b border-gray-800 mb-2">
                    <div class="flex items-center justify-between mb-1">
                        <label for="bg-mode" class="text-sm font-medium text-purple-300 flex items-center gap-1.5">
                            🖼️ 캔버스 배경 (효과 분리)
                            <svg data-tooltip="효과를 독립적인 파일로 저장하고 싶을 때, 원본 사진 대신 투명/검정/흰색 배경을 선택하여 적용된 효과만 추출할 수 있습니다." xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 cursor-help hover:text-purple-400 transition-colors help-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        </label>
                    </div>
                    <select id="bg-mode" class="w-full bg-gray-900 text-xs text-gray-300 rounded px-2 py-2 border border-gray-700 focus:border-purple-500 outline-none font-medium">
                        <option value="image">📸 원본 사진</option>
                        <option value="transparent">🫥 투명 배경 (먼지/반사광 추출용)</option>
                        <option value="black">⬛ 검은 배경 (밝은 효과 추출용)</option>
                        <option value="white">⬜ 흰 배경 (어두운 효과 추출용)</option>
                    </select>
                </div>

                <!-- 0-1. 보호 마스크 (Brush Mask) -->
                <div class="space-y-3 pb-3 border-b border-gray-800 mb-2">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-1.5">
                            <label for="mask-toggle" class="text-sm font-medium text-gray-300">🖌️ 보호 마스크</label>
                            <svg data-tooltip="브러시로 문지른 영역은 필터와 효과가 적용되지 않고 원본 상태를 유지합니다." xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 cursor-help hover:text-purple-400 transition-colors help-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="mask-toggle" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                        </label>
                    </div>
                    
                    <div class="flex flex-col gap-3 opacity-50 pointer-events-none transition-opacity" id="mask-controls">
                        <div class="flex gap-2">
                            <button id="tool-brush" class="flex-1 py-1.5 bg-purple-600 text-white text-xs rounded border border-purple-500 font-medium">그리기</button>
                            <button id="tool-eraser" class="flex-1 py-1.5 bg-gray-800 text-gray-400 text-xs rounded border border-gray-700 font-medium hover:bg-gray-700">지우개</button>
                        </div>
                        <div class="flex gap-3 items-center">
                            <div class="flex-1 flex flex-col gap-1">
                                <div class="flex justify-between items-center">
                                    <label class="text-xs text-gray-500">브러시 크기</label>
                                    <span id="brush-size-val" class="text-xs text-purple-400 font-mono">50</span>
                                </div>
                                <input type="range" id="brush-size" min="10" max="200" value="50">
                            </div>
                        </div>
                        <div class="flex justify-between items-center mt-1">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="show-mask" checked class="accent-purple-500 w-4 h-4 rounded">
                                <span class="text-xs text-gray-300">👁️ 마스크 영역 보기 (빨강)</span>
                            </label>
                            <button id="clear-mask-btn" class="text-xs text-rose-400 hover:text-rose-300 underline">모두 지우기</button>
                        </div>
                    </div>
                </div>

                <!-- 1. 화질 열화 -->
                <div class="space-y-1">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-1.5">
                            <label for="degrade" class="text-sm font-medium text-gray-300">화질 열화</label>
                            <svg data-tooltip="이미지의 해상도와 색상을 낮춰 옛날 디지털 카메라나 폰카 같은 거친 화질을 만듭니다." xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 cursor-help hover:text-purple-400 transition-colors help-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            <label class="ml-1 flex items-center gap-1 cursor-pointer bg-gray-800 px-1.5 py-0.5 rounded border border-gray-700 hover:border-purple-500 transition-colors" title="이 필터에 보호 마스크를 적용합니다.">
                                <input type="checkbox" id="mask-cb-degrade" class="accent-purple-500 w-2.5 h-2.5" checked>
                                <span class="text-[10px] text-gray-400 leading-none">마스크</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-1">
                            <input type="number" step="0.1" id="degrade-num" min="0" max="100" value="0" class="w-12 bg-gray-800 text-purple-400 font-mono text-xs text-right rounded px-1 py-0.5 border border-gray-700 focus:border-purple-500 outline-none spin-hidden">
                            <span class="text-xs text-gray-500 w-3">%</span>
                        </div>
                    </div>
                    <input type="range" id="degrade" min="0" max="100" value="0">
                </div>

                <!-- 2. 크로스 프로세싱 -->
                <div class="space-y-1">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-1.5">
                            <label for="crossprocess" class="text-sm font-medium text-gray-300">크로스 프로세싱</label>
                            <svg data-tooltip="필름 현상 시 다른 약품을 교차 사용하여 독특하고 빈티지한 색감 왜곡을 만듭니다." xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 cursor-help hover:text-purple-400 transition-colors help-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            <label class="ml-1 flex items-center gap-1 cursor-pointer bg-gray-800 px-1.5 py-0.5 rounded border border-gray-700 hover:border-purple-500 transition-colors" title="이 필터에 보호 마스크를 적용합니다.">
                                <input type="checkbox" id="mask-cb-crossprocess" class="accent-purple-500 w-2.5 h-2.5" checked>
                                <span class="text-[10px] text-gray-400 leading-none">마스크</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-1">
                            <input type="number" step="0.1" id="crossprocess-num" min="0" max="100" value="0" class="w-12 bg-gray-800 text-purple-400 font-mono text-xs text-right rounded px-1 py-0.5 border border-gray-700 focus:border-purple-500 outline-none spin-hidden">
                            <span class="text-xs text-gray-500 w-3">%</span>
                        </div>
                    </div>
                    <input type="range" id="crossprocess" min="0" max="100" value="0">
                </div>

                <!-- 3. 어두운 영역 틴트 -->
                <div class="space-y-1">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-1.5">
                            <label for="shadow-tint" class="text-sm font-medium text-gray-300">어두운 영역 틴트</label>
                            <svg data-tooltip="사진의 어두운 영역(그림자)에 녹색 또는 자홍색 빛을 추가하여 레트로한 분위기를 연출합니다." xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 cursor-help hover:text-purple-400 transition-colors help-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            <label class="ml-1 flex items-center gap-1 cursor-pointer bg-gray-800 px-1.5 py-0.5 rounded border border-gray-700 hover:border-purple-500 transition-colors" title="이 필터에 보호 마스크를 적용합니다.">
                                <input type="checkbox" id="mask-cb-shadow-tint" class="accent-purple-500 w-2.5 h-2.5" checked>
                                <span class="text-[10px] text-gray-400 leading-none">마스크</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-1">
                            <input type="number" step="0.1" id="shadow-tint-num" min="-100" max="100" value="0" class="w-12 bg-gray-800 text-purple-400 font-mono text-xs text-right rounded px-1 py-0.5 border border-gray-700 focus:border-purple-500 outline-none spin-hidden">
                        </div>
                    </div>
                    <input type="range" id="shadow-tint" min="-100" max="100" value="0">
                </div>

                <!-- 4. 할레이션 -->
                <div class="space-y-1">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-1.5">
                            <label for="halation" class="text-sm font-medium text-gray-300">할레이션</label>
                            <svg data-tooltip="강한 빛 주변으로 붉은빛이 번지는 아날로그 필름 특유의 빛 번짐 현상을 구현합니다." xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 cursor-help hover:text-purple-400 transition-colors help-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            <label class="ml-1 flex items-center gap-1 cursor-pointer bg-gray-800 px-1.5 py-0.5 rounded border border-gray-700 hover:border-purple-500 transition-colors" title="이 필터에 보호 마스크를 적용합니다.">
                                <input type="checkbox" id="mask-cb-halation" class="accent-purple-500 w-2.5 h-2.5" checked>
                                <span class="text-[10px] text-gray-400 leading-none">마스크</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-1">
                            <input type="number" step="0.1" id="halation-num" min="0" max="100" value="0" class="w-12 bg-gray-800 text-purple-400 font-mono text-xs text-right rounded px-1 py-0.5 border border-gray-700 focus:border-purple-500 outline-none spin-hidden">
                            <span class="text-xs text-gray-500 w-3">%</span>
                        </div>
                    </div>
                    <input type="range" id="halation" min="0" max="100" value="0">
                </div>

                <!-- 5. 색수차 -->
                <div class="space-y-1">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-1.5">
                            <label for="aberration" class="text-sm font-medium text-gray-300">색수차 번짐</label>
                            <svg data-tooltip="렌즈 가장자리에서 빛의 파장에 따라 색상이 어긋나는 광학적 왜곡(RGB 분리) 현상을 만듭니다." xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 cursor-help hover:text-purple-400 transition-colors help-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            <label class="ml-1 flex items-center gap-1 cursor-pointer bg-gray-800 px-1.5 py-0.5 rounded border border-gray-700 hover:border-purple-500 transition-colors" title="이 필터에 보호 마스크를 적용합니다.">
                                <input type="checkbox" id="mask-cb-aberration" class="accent-purple-500 w-2.5 h-2.5" checked>
                                <span class="text-[10px] text-gray-400 leading-none">마스크</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-1">
                            <input type="number" step="0.1" id="aberration-num" min="0" max="50" value="0" class="w-12 bg-gray-800 text-purple-400 font-mono text-xs text-right rounded px-1 py-0.5 border border-gray-700 focus:border-purple-500 outline-none spin-hidden">
                            <span class="text-xs text-gray-500 w-3">px</span>
                        </div>
                    </div>
                    <input type="range" id="aberration" min="0" max="50" value="0">
                </div>

                <!-- 6. 노이즈 -->
                <div class="space-y-1">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex items-center gap-1.5">
                            <label for="noise" class="text-sm font-medium text-gray-300">노이즈</label>
                            <svg data-tooltip="오래된 필름 사진에서 볼 수 있는 거칠고 자글자글한 입자(그레인)감을 추가합니다." xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 cursor-help hover:text-purple-400 transition-colors help-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            <label class="ml-1 flex items-center gap-1 cursor-pointer bg-gray-800 px-1.5 py-0.5 rounded border border-gray-700 hover:border-purple-500 transition-colors" title="이 필터에 보호 마스크를 적용합니다.">
                                <input type="checkbox" id="mask-cb-noise" class="accent-purple-500 w-2.5 h-2.5" checked>
                                <span class="text-[10px] text-gray-400 leading-none">마스크</span>
                            </label>
                        </div>
                        <div class="flex items-center gap-1">

        const dateGlowNum = document.getElementById('date-glow-num');
        const dateNoiseSlider = document.getElementById('date-noise');
        const dateNoiseNum = document.getElementById('date-noise-num');
        const dateControls = document.getElementById('date-controls');
        
        let originalImage = new Image();
        let isImageLoaded = false;
        let hasRealImage = false;
        let renderTimeout = null;
        
        let activeTool = null;
        let isDraggingFlare = false;
        let isDrawingMask = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let currentFlareX = 50; 
        let currentFlareY = 50;
        let dragStartFlareX = 50;
        let dragStartFlareY = 50;

        let lastMaskX = 0;
        let lastMaskY = 0;
        let isEraserMode = false;

        let effectCanvas = document.createElement('canvas');
        let effectCtx = effectCanvas.getContext('2d', { willReadFrequently: true });
        let maskCanvas = document.createElement('canvas');
        let maskCtx = maskCanvas.getContext('2d');

        // 메모리 부족으로 인한 iframe/모바일 크래시 방지용 전역 캔버스 풀 (Workspace)
        const workspaceCanvases = {
            off: document.createElement('canvas'),
            restore: document.createElement('canvas'),
            layer1: document.createElement('canvas'),
            layer2: document.createElement('canvas'),
            scaledMask: document.createElement('canvas'),
            tempMask: document.createElement('canvas'),
            tCanvas: document.createElement('canvas'),
            detailCanvas: document.createElement('canvas')
        };
        const ctxOff = workspaceCanvases.off.getContext('2d', { willReadFrequently: true });
        const ctxRestore = workspaceCanvases.restore.getContext('2d', { willReadFrequently: true });
        const ctxL1 = workspaceCanvases.layer1.getContext('2d', { willReadFrequently: true });
        const ctxL2 = workspaceCanvases.layer2.getContext('2d', { willReadFrequently: true });
        const ctxSM = workspaceCanvases.scaledMask.getContext('2d', { willReadFrequently: true });
        const tmCtx = workspaceCanvases.tempMask.getContext('2d', { willReadFrequently: true });
        const tCtx = workspaceCanvases.tCanvas.getContext('2d', { willReadFrequently: true });
        
        // 정적 엠보싱 디테일 맵 (한 번만 생성)
        workspaceCanvases.detailCanvas.width = 256;
        workspaceCanvases.detailCanvas.height = 256;
        const detailCtx = workspaceCanvases.detailCanvas.getContext('2d');
        const dData = detailCtx.createImageData(256, 256);
        const dd = dData.data;
        for(let i=0; i<dd.length; i+=4) {
            const v = 128 + (Math.random() - 0.5) * 80;
            dd[i] = dd[i+1] = dd[i+2] = v;
            dd[i+3] = 255;
        }
        detailCtx.putImageData(dData, 0, 0);

        function resizeWorkspaces(w, h) {
            for (const key in workspaceCanvases) {
                // tempMask와 detailCanvas는 별도로 관리
                if (key !== 'tempMask' && key !== 'detailCanvas' && key !== 'tCanvas') {
                    if (workspaceCanvases[key].width !== w || workspaceCanvases[key].height !== h) {
                        workspaceCanvases[key].width = w;
                        workspaceCanvases[key].height = h;
                    }
                }
            }
        }

        let dustParticles = [];
        let scratchLines = [];

        dateInput.value = new Date().toISOString().split('T')[0];
        fileInput.addEventListener('change', handleImageUpload);
        
        const globalTooltip = document.getElementById('global-tooltip');
        const helpIcons = document.querySelectorAll('.help-icon');
        
        helpIcons.forEach(icon => {
            icon.addEventListener('mouseenter', (e) => {
                globalTooltip.textContent = icon.getAttribute('data-tooltip');
                const rect = icon.getBoundingClientRect();
                let top = rect.top - globalTooltip.offsetHeight - 8;
                let left = rect.left + (rect.width / 2) - (globalTooltip.offsetWidth / 2);
                if (top < 10) top = rect.bottom + 8;
                if (left < 10) left = 10;
                if (left + globalTooltip.offsetWidth > window.innerWidth - 10) left = window.innerWidth - globalTooltip.offsetWidth - 10;
                globalTooltip.style.top = top + 'px';
                globalTooltip.style.left = left + 'px';
                globalTooltip.style.opacity = '1';
                globalTooltip.style.visibility = 'visible';
            });
            icon.addEventListener('mouseleave', () => {
                globalTooltip.style.opacity = '0';
                globalTooltip.style.visibility = 'hidden';
            });
        });

        function setActiveTool(tool) {
            activeTool = tool;
            if (!isImageLoaded) return;
            if (activeTool === 'mask' && maskToggle.checked) {
                canvas.style.cursor = showMaskToggle.checked ? 'none' : 'default';
                if (!showMaskToggle.checked) brushCursor.style.display = 'none';
            } else if (activeTool === 'flare' && flareToggle.checked) {
                canvas.style.cursor = 'move';
                brushCursor.style.display = 'none';
            } else if (activeTool === 'crossfilter' && crossFilterToggle.checked) {
                canvas.style.cursor = 'crosshair';
                brushCursor.style.display = 'none';
            } else {
                canvas.style.cursor = 'default';
                brushCursor.style.display = 'none';
            }
        }

        function syncInputPair(sliderId, numId) {
            const slider = document.getElementById(sliderId);
            const num = document.getElementById(numId);
            if(!slider || !num) return;
            
            const trigger = () => {
                if (isImageLoaded) {
                    clearTimeout(renderTimeout);
                    renderTimeout = setTimeout(() => applyEffects(), 50);
                }
            };

            slider.addEventListener('input', (e) => {
                num.value = e.target.value;
                if (sliderId === 'shadow-tint') updateShadowTintColor();
                if (sliderId === 'brush-size') document.getElementById('brush-size-val').textContent = e.target.value;
                else trigger();
            });
            
            num.addEventListener('input', (e) => {
                let val = parseFloat(e.target.value);
                if (!isNaN(val)) {
                    slider.value = val;
                    if (sliderId !== 'brush-size') trigger();
                }
                if (sliderId === 'shadow-tint') updateShadowTintColor();
            });

            num.addEventListener('change', (e) => {
                let val = parseFloat(e.target.value);
                if (isNaN(val)) val = parseFloat(slider.value);
                const min = parseFloat(slider.min);
                const max = num.hasAttribute('max') ? parseFloat(num.max) : parseFloat(slider.max);
                val = Math.max(min, Math.min(max, val));
                val = Math.round(val * 10) / 10;
                num.value = val;
                slider.value = val;
                if (sliderId === 'shadow-tint') updateShadowTintColor();
                if (sliderId !== 'brush-size') trigger();
            });
        }

        const updateShadowTintColor = () => {
            const numEl = document.getElementById('shadow-tint-num');
            let val = parseFloat(numEl.value) || 0;
            if(val < 0) numEl.style.color = "#2dd4bf"; 
            else if(val > 0) numEl.style.color = "#fb7185"; 
            else numEl.style.color = "#c084fc"; 
        };

        syncInputPair('degrade', 'degrade-num');
        syncInputPair('crossprocess', 'crossprocess-num');
        syncInputPair('shadow-tint', 'shadow-tint-num');
        syncInputPair('halation', 'halation-num');
        syncInputPair('aberration', 'aberration-num');
        syncInputPair('noise', 'noise-num');
        syncInputPair('dust', 'dust-num');
        syncInputPair('dust-opacity', 'dust-opacity-num'); 
        syncInputPair('paper', 'paper-num'); 
        syncInputPair('lightleak', 'lightleak-num');
        syncInputPair('vignette', 'vignette-num');

        syncInputPair('flare-opacity', 'flare-opacity-num');
        syncInputPair('flare-size', 'flare-size-num');
        syncInputPair('flare-thickness', 'flare-thickness-num');
        syncInputPair('flare-core-bright', 'flare-core-bright-num');
        syncInputPair('flare-core-size', 'flare-core-size-num');
        syncInputPair('flare-aberration', 'flare-aberration-num');
        syncInputPair('flare-noise', 'flare-noise-num');
        syncInputPair('flare-blur', 'flare-blur-num');
        
        syncInputPair('crossfilter-intensity', 'crossfilter-intensity-num');
        syncInputPair('crossfilter-length', 'crossfilter-length-num');
        syncInputPair('crossfilter-thickness', 'crossfilter-thickness-num');
        syncInputPair('crossfilter-angle', 'crossfilter-angle-num');
        syncInputPair('crossfilter-rainbow', 'crossfilter-rainbow-num');
        syncInputPair('crossfilter-opacity', 'crossfilter-opacity-num');
        syncInputPair('crossfilter-blur', 'crossfilter-blur-num');
        syncInputPair('crossfilter-aberration', 'crossfilter-aberration-num');
        syncInputPair('crossfilter-noise', 'crossfilter-noise-num');

        syncInputPair('date-size', 'date-size-num');
        syncInputPair('date-glow', 'date-glow-num');

        function getClientPos(e) {
            if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }

        function getInternalPos(e) {
            const rect = canvas.getBoundingClientRect();
            const pos = getClientPos(e);
            const scale = Math.min(rect.width / canvas.width, rect.height / canvas.height);
            const drawW = canvas.width * scale;
            const drawH = canvas.height * scale;
            const offsetX = (rect.width - drawW) / 2 + rect.left;
            const offsetY = (rect.height - drawH) / 2 + rect.top;
            
            return { x: (pos.x - offsetX) / scale, y: (pos.y - offsetY) / scale };
        }

        function drawMaskStroke(x, y, isLine) {
            maskCtx.beginPath();
            maskCtx.lineCap = 'round';

            maskCtx.lineWidth = Math.max(5, (canvas.width * brushSizeSlider.value) / 1000); 
            
            maskCtx.globalCompositeOperation = isEraserMode ? 'destination-out' : 'source-over';
            maskCtx.shadowBlur = maskCtx.lineWidth * 0.2;
            maskCtx.shadowColor = 'black';
            maskCtx.strokeStyle = 'black';
            maskCtx.fillStyle = 'black';
            
            if (isLine) {
                maskCtx.moveTo(lastMaskX, lastMaskY);
                maskCtx.lineTo(x, y);
                maskCtx.stroke();
            } else {
                maskCtx.arc(x, y, maskCtx.lineWidth / 2, 0, Math.PI * 2);
                maskCtx.fill();
            }
        }

        function handlePointerDown(e) {
            if (!isImageLoaded) return;
            
            if (activeTool === 'mask' && maskToggle.checked) {
                if (!showMaskToggle.checked) return; 
                if (e.cancelable) e.preventDefault();
                isDrawingMask = true;
                const pos = getInternalPos(e);
                lastMaskX = pos.x; 
                lastMaskY = pos.y;
                drawMaskStroke(pos.x, pos.y, false);
                renderPreview();
            }
            else if (activeTool === 'flare' && flareToggle.checked) {
                if (e.cancelable) e.preventDefault();
                isDraggingFlare = true; 
                const pos = getClientPos(e);
                dragStartX = pos.x;
                dragStartY = pos.y;
                dragStartFlareX = currentFlareX;
                dragStartFlareY = currentFlareY;
            }
            else if (activeTool === 'crossfilter' && crossFilterToggle.checked) {
                if (e.cancelable) e.preventDefault();
                const pos = getInternalPos(e);
                crossFlares.push({ x: pos.x / canvas.width, y: pos.y / canvas.height });
                clearTimeout(renderTimeout);
                renderTimeout = setTimeout(() => applyEffects(), 10);
            }
        }

        function handlePointerMove(e) {
            if (activeTool === 'mask' && maskToggle.checked && showMaskToggle.checked && isImageLoaded) {
                const rect = canvas.getBoundingClientRect();
                const pos = getClientPos(e);
                
                if (pos.x >= rect.left && pos.x <= rect.right && pos.y >= rect.top && pos.y <= rect.bottom) {
                    brushCursor.style.display = 'block';
                    brushCursor.style.left = pos.x + 'px';
                    brushCursor.style.top = pos.y + 'px';
                    const scale = Math.min(rect.width / canvas.width, rect.height / canvas.height);
                    const baseLineWidth = Math.max(5, (canvas.width * brushSizeSlider.value) / 1000);
                    const onScreenSize = baseLineWidth * scale;
                    brushCursor.style.width = onScreenSize + 'px';
                    brushCursor.style.height = onScreenSize + 'px';
                } else {
                    brushCursor.style.display = 'none';
                }
            } else {
                brushCursor.style.display = 'none';
            }

            if (isDrawingMask) {
                if (e.cancelable) e.preventDefault();
                const pos = getInternalPos(e);
                drawMaskStroke(pos.x, pos.y, true);
                lastMaskX = pos.x; 
                lastMaskY = pos.y;
                renderPreview(); 
            } 
            else if (isDraggingFlare) {
                if (e.cancelable) e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const pos = getClientPos(e);
                let pctDeltaX = ((pos.x - dragStartX) / rect.width) * 100;

                currentFlareY = Math.max(-100, Math.min(200, dragStartFlareY + pctDeltaY));
                clearTimeout(renderTimeout);
                renderTimeout = setTimeout(() => applyEffects(), 10);
            }
        }

        // 메모리 누수 완벽 차단: 프리뷰 전용 캔버스 재사용
        function renderPreview() {
            if (!isImageLoaded) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = true;
            ctx.drawImage(effectCanvas, 0, 0, canvas.width, canvas.height);

            if (showMaskToggle.checked) {
                ctx.save();
                if (workspaceCanvases.tempMask.width !== canvas.width || workspaceCanvases.tempMask.height !== canvas.height) {
                    workspaceCanvases.tempMask.width = canvas.width;
                    workspaceCanvases.tempMask.height = canvas.height;
                }
                tmCtx.clearRect(0, 0, canvas.width, canvas.height);
                tmCtx.drawImage(maskCanvas, 0, 0, canvas.width, canvas.height);
                tmCtx.globalCompositeOperation = 'source-in';
                tmCtx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                tmCtx.fillRect(0, 0, canvas.width, canvas.height);
                tmCtx.globalCompositeOperation = 'source-over';
                
                ctx.drawImage(workspaceCanvases.tempMask, 0, 0);
                ctx.restore();
            }
        }

        function applyEffects(onComplete = null, targetDim = null) {

                const m_noise = document.getElementById('mask-cb-noise').checked;
                const m_dust = document.getElementById('mask-cb-dust').checked;
                const m_paper = document.getElementById('mask-cb-paper').checked;
                const m_leak = document.getElementById('mask-cb-lightleak').checked;
                const m_vignette = document.getElementById('mask-cb-vignette').checked;
                const m_flare = document.getElementById('mask-cb-flare').checked;
                const m_crossfilter = document.getElementById('mask-cb-crossfilter').checked;
                const m_date = document.getElementById('mask-cb-datestamp').checked;

                resizeWorkspaces(w, h);

                const offCanvas = workspaceCanvases.off;
                const offCtx = ctxOff;

                const restoreCanvas = workspaceCanvases.restore;
                const restoreCtx = ctxRestore;

                let scaledMaskCanvas = maskCanvas;
                if (maskCanvas.width !== w || maskCanvas.height !== h) {
                    scaledMaskCanvas = workspaceCanvases.scaledMask;
                    ctxSM.clearRect(0, 0, w, h);
                    ctxSM.drawImage(maskCanvas, 0, 0, w, h);
                }

                function applyEffectWithMask(effectFn, isMaskEnabled) {
                    if (isMaskEnabled) {
                        restoreCtx.globalCompositeOperation = 'source-over';
                        restoreCtx.clearRect(0, 0, w, h);
                        restoreCtx.drawImage(offCanvas, 0, 0);
                    }
                    effectFn(); 
                    if (isMaskEnabled) {
                        restoreCtx.globalCompositeOperation = 'destination-in';
                        restoreCtx.drawImage(scaledMaskCanvas, 0, 0, w, h);
                        offCtx.globalCompositeOperation = 'source-over';
                        offCtx.drawImage(restoreCanvas, 0, 0, w, h);
                    }
                }

                let maskData = scaledMaskCanvas.getContext('2d').getImageData(0, 0, w, h).data;
                
                offCtx.clearRect(0, 0, w, h);
                if (bgMode === 'image') {
                    offCtx.drawImage(originalImage, 0, 0, w, h);
                } else if (bgMode === 'black') {
                    offCtx.fillStyle = 'black';
                    offCtx.fillRect(0, 0, w, h);
                } else if (bgMode === 'white') {
                    offCtx.fillStyle = 'white';
                    offCtx.fillRect(0, 0, w, h);
                }

                if (degradeAmt > 0) {
                    applyEffectWithMask(() => {
                        const pixelScale = 1 - (degradeAmt * 0.008); 
                        const tempW = Math.max(1, Math.floor(w * pixelScale));
                        const tempH = Math.max(1, Math.floor(h * pixelScale));
                        const tempCtx = ctxL1;
                        tempCtx.clearRect(0, 0, tempW, tempH);
                        const contrast = 100 + degradeAmt * 0.6;
                        const saturate = 100 - degradeAmt * 0.2;
                        const sepia = degradeAmt * 0.3;
                        tempCtx.filter = `contrast(${contrast}%) saturate(${saturate}%) sepia(${sepia}%)`;
                        tempCtx.drawImage(offCanvas, 0, 0, tempW, tempH);
                        offCtx.imageSmoothingEnabled = false;
                        offCtx.drawImage(workspaceCanvases.layer1, 0, 0, tempW, tempH, 0, 0, w, h);
                        tempCtx.filter = 'none';
                    }, m_degrade);
                }

                if (halationAmt > 0) {
                    applyEffectWithMask(() => {
                        const hCtx = ctxL1;
                        hCtx.clearRect(0, 0, w, h);
                        hCtx.filter = `contrast(300%) brightness(70%)`;
                        hCtx.drawImage(offCanvas, 0, 0);
                        hCtx.globalCompositeOperation = 'multiply';
                        hCtx.fillStyle = '#ff2200';
                        hCtx.fillRect(0, 0, w, h);
                        offCtx.globalCompositeOperation = 'screen';
                        offCtx.filter = `blur(${Math.max(4, w * 0.015)}px)`;
                        offCtx.globalAlpha = halationAmt / 100;
                        offCtx.drawImage(workspaceCanvases.layer1, 0, 0);
                        offCtx.filter = 'none';
                        offCtx.globalAlpha = 1.0;
                        offCtx.globalCompositeOperation = 'source-over';
                    }, m_date);
                }

                if (targetDim === null) {
                    effectCanvas.width = w; effectCanvas.height = h;
                    effectCtx.clearRect(0, 0, w, h);
                    effectCtx.drawImage(offCanvas, 0, 0);
                    renderPreview(); 
                } else {
                    const downloadCanvas = document.createElement('canvas');
                    downloadCanvas.width = w; downloadCanvas.height = h;
                    const dCtx = downloadCanvas.getContext('2d');
                    dCtx.drawImage(offCanvas, 0, 0, w, h); 
                    if (onComplete) onComplete(downloadCanvas);
                }
                } catch(err) {
                    console.error("Effect Processing Error:", err);
                } finally {
                    if (targetDim === null && !isDraggingFlare && !isDrawingMask) loading.classList.add('hidden');
                }
            }, 30);
        }

        function downloadImage() {
            if (!isImageLoaded) return;
            const resSelect = document.getElementById('download-res');
            const resValue = parseInt(resSelect.value);
            const loadingText = loading.querySelector('span.text-sm');
            const originalText = loadingText.textContent;
            loadingText.textContent = '고화질 렌더링 및 저장 중...';
            loading.classList.remove('hidden');

            applyEffects((targetCanvas) => {
                const link = document.createElement('a');
                link.download = `retro_photo_${Date.now()}.png`;
                link.href = targetCanvas.toDataURL('image/png', 1.0);
                link.click();
                loadingText.textContent = originalText;
                applyEffects(); 
            }, resValue);
        }
    </script>
</body>
</html>
